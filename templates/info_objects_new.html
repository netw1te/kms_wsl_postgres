{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Создание информационного объекта</h1>
  <p class="muted">Минимальная форма ввода</p>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/app/info-objects/new">
    <div class="grid-2">
      <div>
        <label>Заголовок</label>
        <input name="title" />
      </div>
      <div>
        <label>Автор</label>
        <input name="author" />
      </div>
    </div>

    <div style="margin-top: 16px;">
      <label>Текст</label>
      <textarea name="content"></textarea>
    </div>

    <div class="grid-2" style="margin-top: 16px;">
      <div>
        <label>Источник</label>
        <input name="source" />
      </div>
      <div>
        <label>URL</label>
        <input name="url" />
      </div>
    </div>

    <div class="grid-2" style="margin-top: 16px;">
      <div>
        <label>DOI</label>
        <input name="doi" />
      </div>
      <div>
        <label>Название публикации</label>
        <input name="publication_title" />
      </div>
    </div>

    <div class="grid-2" style="margin-top: 16px;">
      <div>
        <label>Дата от</label>
        <input name="publication_date_from_raw" placeholder="2024 или 05.2024 или 16.04.2026" />
      </div>
      <div>
        <label>Дата до</label>
        <input name="publication_date_to_raw" placeholder="2024 или 05.2024 или 16.04.2026" />
      </div>
    </div>

    <div style="margin-top: 16px;">
      <label>Метки (через запятую)</label>
      <input name="tags_text" placeholder="тест, статья, право" />
    </div>

    <div style="margin-top: 16px;">
      <button class="btn" type="submit">Сохранить</button>
      <a class="btn btn-secondary" href="/app/info-objects">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
